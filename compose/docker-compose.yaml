services:
    
    # Application
    phpfpm:
        build:
            context: .
            dockerfile: ./docker/phpfpm.dockerfile
        working_dir: /var/www
        volumes:
            - ./:/var/www
        depends_on:
            - "database"
    # Web Server
    nginx:
        build:
            context: .
            dockerfile: ./docker/nginx.dockerfile
        working_dir: /var/www
        volumes:
            - ./:/var/www
        depends_on:
            - "phpfpm"
        ports:
            - 80:80
    # Database
    database:
        image: mysql:8.0
        volumes:
            - database:/var/lib/mysql
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_USER: ${DB_USERNAME}
        ports:
            - "3306:3306"
    # Database management
    pma:
        image: phpmyadmin:5.1
        environment:
            - PMA_ARBITRARY=1
            - PMA_HOST=${DB_HOST}
            - PMA_USER=${DB_USERNAME}
            - PMA_PASSWORD=${DB_PASSWORD}
            - PMA_PORT=${DB_PORT}
        depends_on:
            - database
        ports:
            - 8888:80
    # Mailing Server
    mailhog:
        image: mailhog/mailhog
        # logging:
        #     driver: 'none'
        ports:
            - 1025:1025 
            - 8025:8025 

volumes:
    database: